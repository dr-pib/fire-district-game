<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Communities Reference Map — Capps-Batavia</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; }

    header {
      background: #111827;
      color: #e8eaf0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid #cc2200;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1rem; font-weight: 700; color: #f97316; flex: 1; }
    header a {
      font-size: 0.8rem;
      color: #93c5fd;
      text-decoration: none;
      border: 1px solid #3b5a7a;
      border-radius: 5px;
      padding: 3px 9px;
    }
    header a:hover { background: #1e3a5f; }

    #hint {
      background: #1e3a5f;
      color: #93c5fd;
      text-align: center;
      padding: 5px;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    #map { flex: 1; }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1f2e;
      color: #9ca3af;
      font-size: 1rem;
      z-index: 9999;
      flex-direction: column;
      gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #374151;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Community name labels */
    .community-label {
      background: rgba(0, 0, 0, 0.65) !important;
      border: none !important;
      box-shadow: none !important;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      padding: 2px 6px !important;
      border-radius: 4px;
      pointer-events: none;
      line-height: 1.3;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading community data…</span>
</div>

<header>
  <h1>Communities Reference Map — Capps-Batavia Fire District</h1>
  <a href="/">← Game</a>
  <a href="/manage-communities.html">Manage Communities</a>
</header>

<div id="hint">Labels visible at zoom 12+</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const LABEL_ZOOM = 12;
let labelMarkers = [];

function ringCentroid(ring) {
  const lat = ring.reduce((s, p) => s + p[0], 0) / ring.length;
  const lng = ring.reduce((s, p) => s + p[1], 0) / ring.length;
  return [lat, lng];
}

function allRingsCentroid(rings) {
  const pts = rings.flat();
  const lat = pts.reduce((s, p) => s + p[0], 0) / pts.length;
  const lng = pts.reduce((s, p) => s + p[1], 0) / pts.length;
  return [lat, lng];
}

async function init() {
  const [boundaryData, roadsData, categoriesData, communitiesData, exclusionsData] = await Promise.all([
    fetch('/api/boundary').then(r => r.json()),
    fetch('/api/roads').then(r => r.json()),
    fetch('/api/road-categories').then(r => r.json()),
    fetch('/api/communities').then(r => r.json()),
    fetch('/api/community-exclusions').then(r => r.json()),
  ]);

  const categoryMap = {};
  for (const r of categoriesData.roads ?? []) categoryMap[r.name] = r.category;
  const excludedSet = new Set(exclusionsData.excluded ?? []);

  const map = L.map('map');

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Imagery © Esri', maxZoom: 19,
  }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19, opacity: 0.45,
  }).addTo(map);

  // District boundary
  const bf = boundaryData.features[0];
  const geojson = {
    type: 'Feature',
    geometry: {
      type: bf.geometry.rings.length > 1 ? 'MultiPolygon' : 'Polygon',
      coordinates: bf.geometry.rings.length > 1
        ? bf.geometry.rings.map(r => [r]) : bf.geometry.rings,
    },
  };
  const districtLayer = L.geoJSON(geojson, {
    style: { color: '#f97316', weight: 2.5, fillColor: '#f97316', fillOpacity: 0.06, dashArray: '6 4' },
  }).addTo(map);
  map.fitBounds(districtLayer.getBounds(), { padding: [20, 20] });

  // Background roads (unlabeled, thin, for context)
  const ROAD_COLOR = { 'US Highway': '#4a9eff', 'State Highway': '#55dd55', 'Primary County Road': '#ffd700', 'Secondary Road': '#ffffff' };
  const ROAD_WEIGHT = { 'US Highway': 3.5, 'State Highway': 3, 'Primary County Road': 2, 'Secondary Road': 1 };
  for (const f of roadsData.features) {
    const name = f.attributes?.pstr_fulnam?.trim();
    const paths = f.geometry?.paths;
    if (!name || !paths?.length) continue;
    const cat = categoryMap[name] ?? 'Secondary Road';
    if (cat === 'Excluded') continue;
    const color = ROAD_COLOR[cat] ?? '#fff';
    const weight = ROAD_WEIGHT[cat] ?? 1;
    for (const path of paths) {
      L.polyline(path.map(([lon, lat]) => [lat, lon]), { color, weight, opacity: 0.6 }).addTo(map);
    }
  }

  // Community polygons + labels
  const byName = {};
  for (const f of communitiesData.features ?? []) {
    const name = f.attributes?.subdivision?.trim();
    const rings = f.geometry?.rings;
    if (!name || !rings?.length || excludedSet.has(name)) continue;
    if (!byName[name]) byName[name] = [];
    for (const ring of rings) byName[name].push(ring.map(([lon, lat]) => [lat, lon]));
  }

  for (const [name, rings] of Object.entries(byName)) {
    // Draw polygon(s)
    for (const ring of rings) {
      L.polygon(ring, {
        color: '#06b6d4',
        weight: 2.5,
        fillColor: '#06b6d4',
        fillOpacity: 0.2,
      }).addTo(map);
    }

    // Label at centroid of all rings combined
    const centroid = allRingsCentroid(rings);
    const marker = L.marker(centroid, {
      icon: L.divIcon({
        className: 'community-label',
        html: name,
        iconAnchor: [-4, 8],
      }),
      interactive: false,
    });
    labelMarkers.push(marker);
  }

  // Show/hide labels based on zoom
  function updateLabels() {
    const show = map.getZoom() >= LABEL_ZOOM;
    for (const m of labelMarkers) {
      if (show) m.addTo(map); else map.removeLayer(m);
    }
    document.getElementById('hint').textContent =
      show ? `Showing labels (zoom ${map.getZoom()})` : `Zoom in to see labels (current: ${map.getZoom()}, need: ${LABEL_ZOOM}+)`;
  }
  map.on('zoomend', updateLabels);
  updateLabels();

  document.getElementById('loading').style.display = 'none';
}

init().catch(err => {
  document.getElementById('loading').innerHTML = `<p style="color:#fca5a5">Failed to load: ${err.message}</p>`;
});
</script>
</body>
</html>
